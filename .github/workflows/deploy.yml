name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:latest,${IMAGE}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy over SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Пишем ключ как есть + гарантируем перевод строки в конце
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Проверка, что секрет — валидный OpenSSH private key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          echo "Deploy key fingerprint:"
          ssh-keygen -l -f ~/.ssh/deploy_key.pub

          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to remote server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          # Для pull на сервере используем GITHUB_TOKEN этого job (packages:read)
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"

          if [ -z "${GHCR_TOKEN}" ]; then
            echo "GHCR_TOKEN is empty"
            exit 1
          fi

          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_HOST}" \
            env IMAGE="$IMAGE" GHCR_USER="$GHCR_USER" GHCR_TOKEN="$GHCR_TOKEN" \
            bash -s <<'EOF'
          set -euo pipefail

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          docker pull "${IMAGE}:latest"

          # Снимаем старый контейнер и всё, что держит порт 8000
          docker rm -f time-server || true
          ids="$(docker ps --format '{{.ID}} {{.Ports}}' | awk '/(^|[ ,])0\.0\.0\.0:8000->|:8000->/ {print $1}')"
          if [ -n "${ids}" ]; then
            echo "Freeing port 8000 from containers: ${ids}"
            docker rm -f ${ids}
          fi

          docker run -d \
            --name time-server \
            --restart unless-stopped \
            -p 8000:8000 \
            "${IMAGE}:latest"

          docker image prune -f
          EOF
